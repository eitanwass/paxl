name: Test CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    types:
      - opened
      - reopened
      - edited

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: npm install
    - name: build
      run: make build
    - name: test
      run: make test
